<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worms Math Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        #game-container {
            text-align: center;
        }
        canvas {
            border: 2px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game"></div>
    </div>

    <!-- Load Phaser from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

    <!-- Load Socket.IO from CDN -->
    <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>

    <!-- Load shared constants -->
    <script src="../shared/constants.js"></script>

    <!-- Load game entities and scenes -->
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/Terrain.js"></script>
    <script src="src/entities/Projectile.js"></script>
    <script src="src/entities/Explosion.js"></script>
    <script src="src/scenes/GameScene.js"></script>
    <script src="src/scenes/VictoryScene.js"></script>

    <!-- Load game code -->
    <script src="src/main.js"></script>
</body>
</html>
